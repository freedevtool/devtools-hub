<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor - DevTools Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .tool-card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { margin-bottom: 20px; }
        .upload-area {
            border: 2px dashed #667eea;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            background: #f8fafc;
        }
        .upload-area:hover { background: #edf2f7; }
        .preview-container {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        .preview-box {
            flex: 1;
            text-align: center;
            background: #f8fafc;
            padding: 15px;
            border-radius: 5px;
        }
        .preview-box img {
            max-width: 100%;
            max-height: 200px;
            margin: 10px 0;
        }
        .file-info {
            font-size: 14px;
            color: #4a5568;
            margin: 5px 0;
        }
        .savings {
            color: #48bb78;
            font-weight: bold;
        }
        .controls {
            background: #f8fafc;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
        }
        .quality-control {
            margin-bottom: 20px;
        }
        input[type=range] {
            width: 100%;
            margin: 10px 0;
        }
        .button-group {
            display: flex;
            gap: 10px;
        }
        .compress-btn {
            flex: 1;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .delete-btn {
            flex: 1;
            padding: 12px;
            background: #f56565;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .download-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #48bb78;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back</a>
        <div class="tool-card">
            <h1>🗜️ Image Compressor</h1>
            <p>Reduce image file size significantly - perfect for web</p>
            
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div style="font-size: 40px;">📁</div>
                <div style="font-size: 18px; margin: 10px 0;">Click to upload image</div>
                <div style="color: #718096;">JPG, PNG, WebP (Max 10MB)</div>
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
            </div>

            <div id="previewSection" style="display: none;">
                <div class="preview-container">
                    <div class="preview-box">
                        <h3>Original</h3>
                        <img id="originalImg" src="">
                        <div class="file-info" id="originalInfo"></div>
                    </div>
                    <div class="preview-box">
                        <h3>Compressed</h3>
                        <img id="compressedImg" src="">
                        <div class="file-info" id="compressedInfo"></div>
                        <div class="file-info savings" id="savingsInfo"></div>
                    </div>
                </div>

                <div class="controls">
                    <div class="quality-control">
                        <label>Quality: <span id="qualityValue">50</span>% (Lower = Smaller file)</label>
                        <input type="range" id="quality" min="10" max="100" value="50" step="5" 
                               oninput="document.getElementById('qualityValue').textContent = this.value">
                    </div>
                    
                    <div class="button-group">
                        <button class="compress-btn" onclick="compressImage()">🔄 Compress Now</button>
                        <button class="delete-btn" onclick="deleteImage()">🗑️ Delete</button>
                    </div>

                    <div style="text-align: center; margin-top: 15px;">
                        <a id="downloadLink" class="download-btn" style="display: none;">📥 Download Compressed</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let originalFile = null;
        let originalImage = null;
        let originalSize = 0;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > 10 * 1024 * 1024) {
                alert('File too large! Max 10MB');
                return;
            }

            originalFile = file;
            originalSize = file.size;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                originalImage = new Image();
                originalImage.src = e.target.result;
                originalImage.onload = function() {
                    document.getElementById('originalImg').src = e.target.result;
                    document.getElementById('originalInfo').innerHTML = `
                        Size: ${(originalSize / 1024).toFixed(2)} KB<br>
                        Dimensions: ${originalImage.width} x ${originalImage.height}
                    `;
                    document.getElementById('previewSection').style.display = 'block';
                    document.getElementById('compressedImg').src = '';
                    document.getElementById('compressedInfo').innerHTML = '';
                    document.getElementById('savingsInfo').innerHTML = '';
                    document.getElementById('downloadLink').style.display = 'none';
                };
            };
            reader.readAsDataURL(file);
        });

        function compressImage() {
            if (!originalImage || !originalFile) return;

            const quality = document.getElementById('quality').value / 100;
            
            // Create canvas with original dimensions
            const canvas = document.createElement('canvas');
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(originalImage, 0, 0);

            // Compress based on file type
            let outputType = originalFile.type;
            if (outputType === 'image/png') {
                // PNG doesn't support quality parameter well
                outputType = 'image/jpeg'; // Convert to JPEG for better compression
            }

            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                document.getElementById('compressedImg').src = url;
                
                const compressedSize = blob.size;
                const savings = ((1 - compressedSize/originalSize) * 100).toFixed(1);
                const savedKB = ((originalSize - compressedSize) / 1024).toFixed(2);
                
                document.getElementById('compressedInfo').innerHTML = `
                    Size: ${(compressedSize / 1024).toFixed(2)} KB<br>
                    Dimensions: ${originalImage.width} x ${originalImage.height}
                `;
                
                if (savings > 0) {
                    document.getElementById('savingsInfo').innerHTML = `
                        ✨ Saved ${savings}% (${savedKB} KB)
                    `;
                } else {
                    document.getElementById('savingsInfo').innerHTML = `
                        ⚠️ Try lower quality for better compression
                    `;
                }

                // Setup download
                const downloadLink = document.getElementById('downloadLink');
                downloadLink.href = url;
                downloadLink.download = 'compressed-' + originalFile.name.split('.')[0] + '.jpg';
                downloadLink.style.display = 'inline-block';

            }, outputType, quality);
        }

        function deleteImage() {
            document.getElementById('fileInput').value = '';
            document.getElementById('previewSection').style.display = 'none';
            document.getElementById('originalImg').src = '';
            document.getElementById('compressedImg').src = '';
            document.getElementById('downloadLink').style.display = 'none';
            originalFile = null;
            originalImage = null;
        }
    </script>
</body>
</html>
