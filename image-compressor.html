<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor - DevTools Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .tool-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { margin-bottom: 20px; }
        .upload-area {
            border: 2px dashed #667eea;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .preview {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        .preview-box {
            flex: 1;
            text-align: center;
        }
        .preview-box img {
            max-width: 100%;
            max-height: 200px;
        }
        .controls {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
        }
        input[type=range] { width: 100%; margin: 10px 0; }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }
        .delete-btn { background: #f56565; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back</a>
        <div class="tool-card">
            <h1>🗜️ Image Compressor</h1>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                Click to Upload Image
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
            </div>
            <div id="previewSection" style="display: none;">
                <div class="preview">
                    <div class="preview-box">
                        <h3>Original</h3>
                        <img id="originalImg" src="">
                        <p id="originalSize"></p>
                    </div>
                    <div class="preview-box">
                        <h3>Compressed</h3>
                        <img id="compressedImg" src="">
                        <p id="compressedSize"></p>
                    </div>
                </div>
                <div class="controls">
                    <label>Quality: <span id="qualityVal">70</span>%</label>
                    <input type="range" id="quality" min="10" max="100" value="70" oninput="updateQuality()">
                    <button onclick="compress()">Compress</button>
                    <button class="delete-btn" onclick="deleteImage()">Delete</button>
                    <a id="downloadLink" style="display: block; margin-top: 10px;">Download</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        let originalFile = null;
        let originalImage = null;
        
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                originalFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    originalImage = new Image();
                    originalImage.src = e.target.result;
                    document.getElementById('originalImg').src = e.target.result;
                    document.getElementById('originalSize').textContent = 
                        'Size: ' + (file.size / 1024).toFixed(2) + ' KB';
                    document.getElementById('previewSection').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        function updateQuality() {
            document.getElementById('qualityVal').textContent = document.getElementById('quality').value;
        }

        function compress() {
            if (!originalImage) return;
            const quality = document.getElementById('quality').value / 100;
            const canvas = document.createElement('canvas');
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(originalImage, 0, 0);
            
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                document.getElementById('compressedImg').src = url;
                document.getElementById('compressedSize').textContent = 
                    'Size: ' + (blob.size / 1024).toFixed(2) + ' KB';
                const link = document.getElementById('downloadLink');
                link.href = url;
                link.download = 'compressed-' + originalFile.name;
                link.textContent = '📥 Download';
            }, originalFile.type, quality);
        }

        function deleteImage() {
            document.getElementById('fileInput').value = '';
            document.getElementById('previewSection').style.display = 'none';
        }
    </script>
</body>
</html>
