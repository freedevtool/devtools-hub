<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor - DevTools Hub</title>
    <meta name="description" content="Free online image compressor. Reduce image file size without losing quality. Compress JPG, PNG, WebP instantly.">
    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="TppyO_9iEI0Ey1QJ21HOrPLPLoMVDviDPF3ICqZr_v4" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: white;
            color: #667eea;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 25px;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .back-button:hover {
            transform: translateX(-5px) scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .tool-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        .subtitle {
            color: #666;
            margin-bottom: 25px;
        }
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            background: #f0f3ff;
            border-color: #764ba2;
        }
        .upload-icon {
            font-size: 3em;
            color: #667eea;
            margin-bottom: 10px;
        }
        .compress-controls {
            background: #f8fafc;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #4a5568;
        }
        input[type="range"] {
            width: 100%;
        }
        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        .preview-box {
            background: #f8fafc;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        .preview-box img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
        }
        .file-info {
            font-size: 0.9em;
            color: #64748b;
            margin-top: 5px;
        }
        .primary-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .download-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 30px;
            background: #48bb78;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
        @media (max-width: 768px) {
            .preview-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-button">
            <span class="back-icon">←</span>
            <span>Back to Tools</span>
        </a>
        
        <div class="tool-card">
            <h1>🗜️ Image Compressor</h1>
            <p class="subtitle">Reduce image file size without losing quality. 100% free - no upload needed.</p>
            
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📸</div>
                <div>Click to upload or drag & drop</div>
                <div style="font-size: 0.9em; color: #718096; margin-top: 5px;">Supports JPG, PNG, WebP (max 10MB)</div>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
            </div>
            
            <div id="controls" style="display: none;">
                <div class="compress-controls">
                    <div class="control-group">
                        <label>Quality: <span id="qualityValue">80</span>%</label>
                        <input type="range" id="quality" min="10" max="100" value="80">
                    </div>
                </div>
                
                <div class="preview-container">
                    <div class="preview-box">
                        <h4>Original</h4>
                        <img id="originalPreview" src="">
                        <div class="file-info" id="originalInfo"></div>
                    </div>
                    <div class="preview-box">
                        <h4>Compressed</h4>
                        <img id="compressedPreview" src="">
                        <div class="file-info" id="compressedInfo"></div>
                    </div>
                </div>
                
                <button class="primary-btn" onclick="compressImage()">🔄 Compress Image</button>
                <div style="text-align: center; margin-top: 15px;">
                    <a id="downloadLink" class="download-btn" style="display: none;">📥 Download Compressed</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let originalFile = null;
        let compressedBlob = null;
        
        document.getElementById('uploadArea').addEventListener('click', () => {
            document.getElementById('imageInput').click();
        });
        
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            if (file.size > 10 * 1024 * 1024) {
                alert('File too large! Maximum 10MB');
                return;
            }
            
            originalFile = file;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('originalPreview').src = e.target.result;
                document.getElementById('controls').style.display = 'block';
                document.getElementById('originalInfo').textContent = 
                    `Size: ${(file.size / 1024).toFixed(2)} KB | Type: ${file.type}`;
            };
            reader.readAsDataURL(file);
        });
        
        document.getElementById('quality').addEventListener('input', function(e) {
            document.getElementById('qualityValue').textContent = e.target.value;
        });
        
        function compressImage() {
            if (!originalFile) return;
            
            const quality = document.getElementById('quality').value / 100;
            const reader = new FileReader();
            
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    
                    canvas.toBlob((blob) => {
                        compressedBlob = blob;
                        const url = URL.createObjectURL(blob);
                        document.getElementById('compressedPreview').src = url;
                        document.getElementById('compressedInfo').textContent = 
                            `Size: ${(blob.size / 1024).toFixed(2)} KB | Savings: ${((1 - blob.size/originalFile.size) * 100).toFixed(1)}%`;
                        
                        const downloadLink = document.getElementById('downloadLink');
                        downloadLink.href = url;
                        downloadLink.style.display = 'inline-block';
                        downloadLink.download = `compressed-${originalFile.name}`;
                    }, originalFile.type, quality);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(originalFile);
        }
    </script>
</body>
</html>
