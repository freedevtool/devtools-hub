<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="TppyO_9iEI0Ey1QJ21HOrPLPLoMVDviDPF3ICqZr_v4" />
    <title>Word Counter - Free Online Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .back-link {
            color: white;
            text-decoration: none;
            font-size: 1.2em;
            display: inline-block;
            margin-bottom: 20px;
        }
        .tool-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            font-family: inherit;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .stat-box {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-box h3 {
            color: #667eea;
            margin-bottom: 5px;
            font-size: 1em;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }
        @media (min-width: 600px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to Tools</a>
        
        <div class="tool-card">
            <h1>📝 Word Counter</h1>
            
            <textarea id="textInput" placeholder="Type or paste your text here..." oninput="updateStats()">Hello world. This is a test sentence. Word counter is useful!</textarea>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <h3>Words</h3>
                    <div class="stat-number" id="wordCount">7</div>
                </div>
                
                <div class="stat-box">
                    <h3>Characters</h3>
                    <div class="stat-number" id="charCount">48</div>
                </div>
                
                <div class="stat-box">
                    <h3>Sentences</h3>
                    <div class="stat-number" id="sentenceCount">3</div>
                </div>
                
                <div class="stat-box">
                    <h3>Reading Time</h3>
                    <div class="stat-number" id="readingTime">1</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function updateStats() {
            const text = document.getElementById('textInput').value;
            
            // Count words
            let words = 0;
            if (text.trim() !== '') {
                words = text.trim().split(/\s+/).length;
            }
            document.getElementById('wordCount').textContent = words;
            
            // Count characters
            document.getElementById('charCount').textContent = text.length;
            
            // Count sentences
            let sentences = 0;
            if (text.trim() !== '') {
                sentences = text.split(/[.!?]+/).filter(Boolean).length;
            }
            document.getElementById('sentenceCount').textContent = sentences;
            
            // Calculate reading time (200 words per minute)
            const minutes = Math.ceil(words / 200);
            document.getElementById('readingTime').textContent = minutes;
        }
        
        // Run once when page loads
        window.onload = updateStats;
    </script>
</body>
</html>
