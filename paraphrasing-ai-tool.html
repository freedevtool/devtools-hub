<!DOCTYPE html>

<html>
<head>
<title>AI Paraphraser Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6ff;
}

/* HEADER */
.header{
  background:#6c5ce7;
  color:#fff;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header h2{margin:0;}

.header button{
  background:#fff;
  color:#6c5ce7;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

/* MAIN */
.container{
  display:flex;
  gap:20px;
  padding:20px;
}

/* BOX */
.box{
  flex:1;
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

textarea{
  width:100%;
  height:200px;
  border:none;
  outline:none;
  resize:none;
  font-size:14px;
}

/* TOOLBAR */
.toolbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

select, button{
  padding:8px;
  border-radius:6px;
  border:none;
}

button{
  background:#6c5ce7;
  color:#fff;
  cursor:pointer;
}

button:hover{opacity:0.9;}

.actions{
  margin-top:10px;
  display:flex;
  justify-content:space-between;
}

/* FOOTER */
.stats{
  font-size:12px;
  color:#777;
  margin-top:8px;
}

/* MOBILE */
@media(max-width:768px){
  .container{
    flex-direction:column;
  }
}

</style>

</head>

<body>

<div class="header">
  <h2>🚀 Paraphraser SaaS Tool</h2>
  <button onclick="history.back()">⬅ Back</button>
</div>

<div class="container">

  <!-- INPUT -->

  <div class="box">
    <div class="toolbar">
      <select id="mode">
        <option value="standard">Standard</option>
        <option value="formal">Formal</option>
        <option value="casual">Casual</option>
        <option value="seo">SEO</option>
      </select>

```
  <button onclick="paraphrase()">Rewrite</button>
</div>

<textarea id="input" placeholder="Paste your text here..."></textarea>

<div class="actions">
  <button onclick="resetText()">Clear</button>
  <button onclick="copyInput()">Copy</button>
</div>

<div class="stats">
  Words: <span id="inputCount">0</span>
</div>
```

  </div>

  <!-- OUTPUT -->

  <div class="box">
    <div class="toolbar">
      <span>Output</span>
      <button onclick="copyOutput()">Copy</button>
    </div>

```
<textarea id="output" placeholder="Rewritten text will appear here..."></textarea>

<div class="stats">
  Words: <span id="outputCount">0</span>
</div>
```

  </div>

</div>

<script>

// synonyms
const synonyms = {
  "quick":["fast","rapid"],
  "happy":["joyful","pleased"],
  "big":["large","huge"],
  "small":["tiny","compact"],
  "good":["excellent","great"],
  "bad":["poor","unpleasant"],
  "buy":["purchase","acquire"],
  "car":["vehicle","automobile"],
  "train":["railway","locomotive"],
  "enjoying":["experiencing","loving"],
  "travel":["journey","trip"],
  "tea":["beverage","drink"],
  "moving":["traveling","running"]
};

function getSynonym(word){
  let clean = word.toLowerCase().replace(/[.,!?]/g,"");
  let list = synonyms[clean];
  return list ? list[Math.floor(Math.random()*list.length)] : clean;
}

function applyTone(text,mode){
  if(mode==="formal"){
    return text.replace(/\bI\b/g,"I would").replace(/\bwas\b/g,"had been");
  }
  if(mode==="casual"){
    return text + " 🙂";
  }
  if(mode==="seo"){
    return text + " - optimized content";
  }
  return text;
}

function paraphrase(){
  let input = document.getElementById("input").value.trim();
  let mode = document.getElementById("mode").value;

  if(!input){
    alert("Enter text first");
    return;
  }

  let words = input.split(" ");

  let result = words.map(word=>{
    let punc = word.match(/[.,!?]/g) || "";
    let newWord = getSynonym(word);

    if(word[0]===word[0].toUpperCase()){
      newWord = newWord.charAt(0).toUpperCase()+newWord.slice(1);
    }

    return newWord + punc;
  }).join(" ");

  result = applyTone(result,mode);

  document.getElementById("output").value = result;

  updateCounts();
}

function updateCounts(){
  document.getElementById("inputCount").innerText =
    document.getElementById("input").value.split(" ").filter(w=>w).length;

  document.getElementById("outputCount").innerText =
    document.getElementById("output").value.split(" ").filter(w=>w).length;
}

function resetText(){
  document.getElementById("input").value="";
  document.getElementById("output").value="";
  updateCounts();
}

function copyInput(){
  navigator.clipboard.writeText(document.getElementById("input").value);
}

function copyOutput(){
  navigator.clipboard.writeText(document.getElementById("output").value);
}

// live word count
document.getElementById("input").addEventListener("input",updateCounts);

</script>

</body>
</html>
