<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Paraphrasing Tool</title>
<style>
body { font-family: Arial; background:#020617; color:#fff; padding:20px; }
.container { max-width:700px; margin:auto; background:#1e293b; padding:20px; border-radius:10px; }
textarea { width:100%; height:150px; padding:10px; border-radius:5px; }
button { width:100%; padding:10px; margin-top:10px; border:none; border-radius:5px; cursor:pointer; }
.rewrite-btn { background:#22c55e; }
.clear-btn { background:#ef4444; }
.output { margin-top:15px; background:#0f172a; padding:10px; border-radius:5px; }
.links a { color:#38bdf8; display:block; margin-top:5px; }
</style>
</head>
<body>

<div class="container">
<h2>Paraphrasing Tool</h2>

<textarea id="inputText" placeholder="Enter text..."></textarea>

<button class="rewrite-btn" onclick="rewriteText()">Rewrite</button>
<button class="clear-btn" onclick="clearText()">Clear</button>

<div class="output" id="output"></div>

<div class="links">
<h4>Try Other Tools:</h4>
<a href="/grammar-checker.html">Grammar Checker</a>
<a href="/word-counter.html">Word Counter</a>
</div>
</div>

<script>
const synonyms = {
    "good": "great",
    "bad": "poor",
    "fast": "quick",
    "small": "tiny",
    "big": "large",
    "happy": "joyful",
    "sad": "unhappy"
};

function rewriteText() {
    let text = document.getElementById("inputText").value;

    let words = text.split(" ");
    let newText = words.map(word => synonyms[word.toLowerCase()] || word);

    document.getElementById("output").innerHTML =
        "<span style='color:#22c55e'>" + newText.join(" ") + "</span>";
}

function clearText() {
    document.getElementById("inputText").value = "";
    document.getElementById("output").innerHTML = "";
}
</script>

</body>
</html>
