<!DOCTYPE html>
<html>
<head>
<title>AI Paraphraser Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6ff;
}

.header{
  background:#6c5ce7;
  color:#fff;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  display:flex;
  gap:20px;
  padding:20px;
}

.box{
  flex:1;
  background:#fff;
  padding:15px;
  border-radius:12px;
}

textarea{
  width:100%;
  height:200px;
}
button{
  padding:10px;
  margin-top:10px;
  background:#6c5ce7;
  color:#fff;
  border:none;
}
</style>
</head>

<body>

<div class="header">
  <h2>🚀 Paraphraser Tool</h2>
  <button onclick="history.back()">⬅ Back</button>
</div>

<div class="container">

<!-- INPUT -->
<div class="box">
  <h3>Input</h3>
  <!-- ✅ FIXED ID -->
  <textarea id="paraInput" placeholder="Enter text..."></textarea>

  <!-- ✅ FIXED BUTTON -->
  <button onclick="paraphraseText()">Rewrite</button>
</div>

<!-- OUTPUT -->
<div class="box">
  <h3>Output</h3>
  <!-- ✅ FIXED ID -->
  <textarea id="paraOutput" placeholder="Result will appear here..."></textarea>
</div>

</div>

<!-- ✅ REQUIRED -->
<script src="script.js"></script>

</body>
</html>
