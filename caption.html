<!DOCTYPE html>
<html>
<head>
<title>AI Caption Generator Pro</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  margin:0;
}

/* NAVBAR */
.navbar {
  background:#fff;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.navbar a {
  text-decoration:none;
  color:#6c5ce7;
  font-weight:bold;
}

/* MAIN */
.container {
  max-width:900px;
  margin:20px auto;
  background:#fff;
  padding:25px;
  border-radius:15px;
}

h2 {
  text-align:center;
  color:#6c5ce7;
}

/* TABS */
.tabs {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.tab {
  padding:10px 15px;
  border-radius:8px;
  background:#eee;
  cursor:pointer;
}

.tab.active {
  background:#6c5ce7;
  color:#fff;
}

/* INPUT */
textarea {
  width:100%;
  height:120px;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* BUTTON */
button.main-btn {
  width:100%;
  padding:14px;
  margin-top:10px;
  background:#6c5ce7;
  color:#fff;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* OUTPUT */
.card {
  background:#f4f6ff;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  position:relative;
}

.copy-btn {
  position:absolute;
  right:10px;
  top:10px;
  background:#22c55e;
  border:none;
  padding:6px 10px;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <a href="index.html">⬅ Back to Home</a>
  <span>AI Caption Generator</span>
</div>

<div class="container">

<h2>🚀 Smart Caption Generator</h2>

<!-- INTERNAL TABS -->
<div class="tabs">
  <div class="tab active" onclick="setTab('social', this)">Social Media</div>
  <div class="tab" onclick="setTab('seo', this)">SEO</div>
  <div class="tab" onclick="setTab('business', this)">Business</div>
</div>

<textarea id="input" placeholder="Enter topic..."></textarea>

<button class="main-btn" onclick="generate()">Generate Captions</button>

<div id="output"></div>

</div>

<script>

let currentTab = "social";

// 🔥 TAB SWITCH
function setTab(tab, el){
  currentTab = tab;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}

// 🔥 GENERATE
function generate(){
  let input = document.getElementById("input").value;
  let output = document.getElementById("output");

  output.innerHTML = "";

  if(!input){
    output.innerHTML = "Enter topic!";
    return;
  }

  let captions = [];

  if(currentTab === "social"){
    captions = [
      `🔥 Loving ${input}!`,
      `✨ ${input} vibes only 😍`,
      `🚀 Try ${input} today`,
      `💯 ${input} goals`,
      `❤️ Can't get enough of ${input}`
    ];
  }

  if(currentTab === "seo"){
    captions = [
      `Best ${input} services near you`,
      `Top ${input} provider in your city`,
      `Affordable ${input} solutions`,
      `${input} trusted by customers`,
      `Professional ${input} services`
    ];
  }

  if(currentTab === "business"){
    captions = [
      `Boost your business with ${input}`,
      `${input} solutions for modern growth`,
      `Scale faster using ${input}`,
      `${input} that drives results`,
      `Transform your brand with ${input}`
    ];
  }

  captions.forEach((text, index)=>{
    output.innerHTML += `
      <div class="card">
        <div id="cap${index}">${text}</div>
        <button class="copy-btn" onclick="copyText('cap${index}', this)">Copy</button>
      </div>
    `;
  });
}

// 🔥 COPY FIXED
function copyText(id, btn){
  let text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  btn.innerText = "Copied!";
}

</script>

</body>
</html>
