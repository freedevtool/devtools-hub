   <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grammar Checker</title>
<style>
body { font-family: Arial; background:#020617; color:#fff; padding:20px; }
.container { max-width:600px; margin:auto; background:#1e293b; padding:20px; border-radius:10px; }
textarea { width:100%; height:150px; padding:10px; border-radius:5px; }
button { width:100%; padding:10px; margin-top:10px; border:none; border-radius:5px; cursor:pointer; }
.check-btn { background:#22c55e; color:white; }
.clear-btn { background:#ef4444; color:white; }
.result { margin-top:15px; }
.links a { color:#38bdf8; display:block; margin-top:5px; }
</style>
</head>
<body>

<div class="container">
<h2>Grammar Checker</h2>

<textarea id="inputText" placeholder="Enter text..."></textarea>

<button class="check-btn" onclick="checkGrammar()">Check</button>
<button class="clear-btn" onclick="clearGrammar()">Clear</button>

<div class="result" id="result"></div>

<div class="links">
<h4>Try Other Tools:</h4>
<a href="/gst-calculator.html">GST Calculator</a>
<a href="/word-counter.html">Word Counter</a>
</div>
</div>

<script>
function checkGrammar() {
    let text = document.getElementById("inputText").value;
    let errors = [];

    if (text.includes("dont")) errors.push("<span style='color:#ef4444'>Use 'don't'</span>");
    if (text.includes("didn't went")) errors.push("<span style='color:#ef4444'>Use 'didn't go'</span>");
    if (text.includes("is many")) errors.push("<span style='color:#ef4444'>Use 'are many'</span>");

    if (errors.length === 0) {
        document.getElementById("result").innerHTML = "<span style='color:#22c55e'>No errors found ✅</span>";
    } else {
        document.getElementById("result").innerHTML = errors.join("<br>");
    }
}

function clearGrammar() {
    document.getElementById("inputText").value = "";
    document.getElementById("result").innerHTML = "";
}
</script>

</body>
</html>
