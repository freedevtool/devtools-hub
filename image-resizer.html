<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="canonical" href="https://www.exploredevtools.com/image-resizer.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer - DevTools Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .tool-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { margin-bottom: 20px; }
        .upload-area {
            border: 2px dashed #667eea;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .preview {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        .preview-box {
            flex: 1;
            text-align: center;
        }
        .preview-box img {
            max-width: 100%;
            max-height: 200px;
        }
        .controls {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
        }
        .controls input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover { background: #5a67d8; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back</a>
        <div class="tool-card">
            <h1>🖼️ Image Resizer</h1>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                Click to Upload Image
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
            </div>
            <div id="previewSection" style="display: none;">
                <div class="preview">
                    <div class="preview-box">
                        <h3>Original</h3>
                        <img id="originalImg" src="">
                    </div>
                    <div class="preview-box">
                        <h3>Resized</h3>
                        <img id="resizedImg" src="">
                    </div>
                </div>
                <div class="controls">
                    <label>Width: <input type="number" id="width" value="300"></label>
                    <label>Height: <input type="number" id="height" value="300"></label>
                    <button onclick="resizeImage()">Resize</button>
                    <button onclick="resetTool()">Reset</button>
                    <a id="downloadLink" style="display: block; margin-top: 10px;">Download</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        let originalFile = null;
        let originalImg = null;
        
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                originalFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    originalImg = new Image();
                    originalImg.src = e.target.result;
                    document.getElementById('originalImg').src = e.target.result;
                    document.getElementById('previewSection').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        function resizeImage() {
            if (!originalImg) return;
            const width = parseInt(document.getElementById('width').value);
            const height = parseInt(document.getElementById('height').value);
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(originalImg, 0, 0, width, height);
            const resizedUrl = canvas.toDataURL(originalFile.type);
            document.getElementById('resizedImg').src = resizedUrl;
            const link = document.getElementById('downloadLink');
            link.href = resizedUrl;
            link.download = 'resized-' + originalFile.name;
            link.textContent = '📥 Download';
        }

        function resetTool() {
            document.getElementById('fileInput').value = '';
            document.getElementById('previewSection').style.display = 'none';
        }
    </script>
</body>
</html>
