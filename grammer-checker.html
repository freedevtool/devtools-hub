<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar Checker - DevTools Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .tool-card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { margin-bottom: 20px; color: #333; }
        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 5px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #5a67d8; }
        .clear-btn {
            background: #a0aec0;
        }
        .clear-btn:hover { background: #718096; }
        .results {
            background: #f8fafc;
            border-radius: 5px;
            padding: 20px;
            margin-top: 20px;
        }
        .error-item {
            background: white;
            border-left: 4px solid #f56565;
            padding: 15px;
            margin-bottom: 10px;
        }
        .corrected {
            background: #c6f6d5;
            border-left: 4px solid #48bb78;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Tools</a>
        <div class="tool-card">
            <h1>📝 Grammar Checker</h1>
            <p>Check your text for common grammar and spelling mistakes</p>
            
            <textarea id="inputText" placeholder="Type or paste your text here...">I have went to the store yesterday and buyed some apples. Their is a mistake here.</textarea>
            
            <div class="button-group">
                <button onclick="checkGrammar()">🔍 Check Grammar</button>
                <button class="clear-btn" onclick="clearText()">🗑️ Clear</button>
            </div>
            
            <div id="resultsArea" style="display: none;"></div>
        </div>
    </div>

    <script>
        function checkGrammar() {
            const text = document.getElementById('inputText').value;
            const resultsDiv = document.getElementById('resultsArea');
            
            let errors = [];
            let correctedText = text;

            // Check for common errors
            if (text.includes('have went')) {
                errors.push({
                    original: 'have went',
                    correct: 'have gone',
                    message: 'Use "have gone" instead of "have went"'
                });
                correctedText = correctedText.replace(/have went/g, 'have gone');
            }

            if (text.includes('buyed')) {
                errors.push({
                    original: 'buyed',
                    correct: 'bought',
                    message: 'Past tense of "buy" is "bought"'
                });
                correctedText = correctedText.replace(/buyed/g, 'bought');
            }

            if (text.includes('thier')) {
                errors.push({
                    original: 'thier',
                    correct: 'their',
                    message: 'Spelling: "their" is the correct form'
                });
                correctedText = correctedText.replace(/thier/g, 'their');
            }

            // Display results
            let html = '<div class="results">';
            
            if (errors.length === 0) {
                html += '<p style="color: #48bb78;">✓ No errors found! Your text looks good.</p>';
            } else {
                html += '<h3>Issues Found:</h3>';
                errors.forEach(error => {
                    html += `
                        <div class="error-item">
                            <strong>❌ ${error.original}</strong> → <strong style="color: #48bb78;">${error.correct}</strong>
                            <br><small>${error.message}</small>
                        </div>
                    `;
                });
                
                html += '<div class="corrected">';
                html += '<h4>Corrected Version:</h4>';
                html += `<p>${correctedText}</p>`;
                html += '</div>';
            }
            
            html += '</div>';
            
            resultsDiv.innerHTML = html;
            resultsDiv.style.display = 'block';
        }

        function clearText() {
            document.getElementById('inputText').value = '';
            document.getElementById('resultsArea').style.display = 'none';
        }
    </script>
</body>
</html>
