<!DOCTYPE html>
<html>
<head>
<title>AI Paraphraser Pro</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  margin:0;
}

/* NAVBAR */
.navbar {
  background:#fff;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.navbar a {
  text-decoration:none;
  color:#6c5ce7;
  font-weight:bold;
}

/* MAIN */
.container {
  max-width:900px;
  margin:20px auto;
  background:#fff;
  padding:25px;
  border-radius:15px;
}

h2 {
  text-align:center;
  color:#6c5ce7;
}

textarea {
  width:100%;
  height:150px;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

button.main-btn {
  width:100%;
  padding:14px;
  margin-top:10px;
  background:#6c5ce7;
  color:#fff;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* OUTPUT */
.card {
  background:#f4f6ff;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  position:relative;
}

.card-text {
  white-space:pre-wrap;
  line-height:1.6;
  margin-right:60px;
}

.copy-btn {
  position:absolute;
  right:10px;
  top:10px;
  background:#22c55e;
  border:none;
  padding:6px 10px;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.stats {
  font-size:12px;
  margin-top:8px;
  color:#666;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <a href="index.html">⬅ Back to Home</a>
  <span>AI Paraphraser Pro</span>
</div>

<div class="container">

<h2>✨ Smart Paraphrasing Tool</h2>

<textarea id="input" placeholder="Paste your text..."></textarea>

<button class="main-btn" onclick="rewrite()">Generate Variations</button>

<div id="output"></div>

</div>

<script>

// 🔥 grammar fix
function fixGrammar(text){
  return text
    .replace(/\bi\b/g,"I")
    .replace(/\s+/g," ")
    .trim();
}

// 🔥 split sentences
function splitSentences(text){
  return text.split(/[.!?]+/).filter(s=>s.trim());
}

// 🔥 synonyms
const dict = {
  "traveling":["journeying","exploring","moving"],
  "enjoying":["loving","experiencing"],
  "good":["great","excellent"],
  "coffee":["espresso","brew"]
};

// 🔥 replace words
function replaceWords(sentence){
  return sentence.split(" ").map(w=>{
    let key = w.toLowerCase();
    if(dict[key]){
      return dict[key][Math.floor(Math.random()*dict[key].length)];
    }
    return w;
  }).join(" ");
}

// 🔥 restructure
function restructure(sentence){
  let words = sentence.split(" ");
  if(words.length > 6){
    return words.slice(2).join(" ") + " " + words.slice(0,2).join(" ");
  }
  return sentence;
}

// 🔥 expand
function expand(sentence){
  return "In a simple way, " + sentence;
}

// 🔥 create variation
function createVersion(text,type){
  let sentences = splitSentences(text);

  let result = sentences.map(s=>{
    s = fixGrammar(s);

    if(type===1) return replaceWords(s);
    if(type===2) return restructure(replaceWords(s));
    if(type===3) return expand(replaceWords(s));

  });

  return result.join(". ") + ".";
}

// 🔥 MAIN
function rewrite(){
  let input = document.getElementById("input").value;
  let out = document.getElementById("output");

  out.innerHTML = "";

  if(!input){
    out.innerHTML = "Enter text!";
    return;
  }

  let versions = [
    createVersion(input,1),
    createVersion(input,2),
    createVersion(input,3)
  ];

  versions.forEach((text,index)=>{
    let wordCount = text.split(" ").length;

    out.innerHTML += `
      <div class="card">
        <div class="card-text" id="text${index}">${text}</div>
        <button class="copy-btn" onclick="copyText('text${index}', this)">Copy</button>
        <div class="stats">Words: ${wordCount}</div>
      </div>
    `;
  });
}
    </div>

<a href="json-formatter.html">JSON Formatter</a>

// 🔥 PERFECT COPY (NO CUT BUG)
function copyText(id, btn){
  let text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  btn.innerText = "Copied!";
}

</script>

</body>
</html>
