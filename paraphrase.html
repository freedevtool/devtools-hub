<!DOCTYPE html>
<html>
<head>
<title>AI Paraphraser Pro</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  padding:20px;
}

.container {
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2 {
  text-align:center;
  color:#6c5ce7;
}

textarea {
  width:100%;
  height:150px;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:14px;
  margin-top:10px;
  background:#6c5ce7;
  color:#fff;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.card {
  background:#f4f6ff;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  position:relative;
}

.copy-btn {
  position:absolute;
  right:10px;
  top:10px;
  background:#22c55e;
  border:none;
  padding:5px 10px;
  color:white;
  border-radius:6px;
}

.stats {
  font-size:12px;
  margin-top:5px;
  color:#666;
}
</style>

</head>

<body>

<div class="container">

<h2>🚀 AI Paraphraser Pro</h2>

<textarea id="input" placeholder="Paste your paragraph here..."></textarea>

<button onclick="rewrite()">✨ Generate Smart Variations</button>

<div id="output"></div>

</div>

<script>

// 🔥 grammar correction
function fixGrammar(text){
  return text
    .replace(/\bi\b/g,"I")
    .replace(/\s+/g," ")
    .replace(/\s\./g,".")
    .trim();
}

// 🔥 sentence split
function splitSentences(text){
  return text.split(/[.!?]+/).filter(s => s.trim().length > 0);
}

// 🔥 synonym engine
const dict = {
  "traveling":["journeying","exploring","moving"],
  "enjoying":["liking","experiencing","loving"],
  "train":["railway","train ride"],
  "good":["great","excellent","fantastic"],
  "coffee":["brew","espresso"]
};

// 🔥 replace words smartly
function replaceWords(sentence){
  return sentence.split(" ").map(w=>{
    let key = w.toLowerCase();
    if(dict[key]){
      return dict[key][Math.floor(Math.random()*dict[key].length)];
    }
    return w;
  }).join(" ");
}

// 🔥 restructure sentence
function restructure(sentence){
  let words = sentence.split(" ");
  if(words.length > 5){
    return words.slice(2).join(" ") + " " + words.slice(0,2).join(" ");
  }
  return sentence;
}

// 🔥 expand sentence
function expand(sentence){
  return "In simple terms, " + sentence;
}

// 🔥 shorten sentence
function shorten(sentence){
  return sentence.split(" ").slice(0, Math.ceil(sentence.split(" ").length * 0.8)).join(" ");
}

// 🔥 build variation
function createVersion(text,type){
  let sentences = splitSentences(text);

  let result = sentences.map(s=>{
    s = fixGrammar(s);

    if(type === 1){
      return replaceWords(s);
    }

    if(type === 2){
      return restructure(replaceWords(s));
    }

    if(type === 3){
      return expand(shorten(replaceWords(s)));
    }

  });

  return result.join(". ") + ".";
}

// 🔥 MAIN
function rewrite(){
  let input = document.getElementById("input").value;
  let out = document.getElementById("output");

  out.innerHTML = "";

  if(!input){
    out.innerHTML = "Enter text!";
    return;
  }

  let v1 = createVersion(input,1);
  let v2 = createVersion(input,2);
  let v3 = createVersion(input,3);

  let results = [v1,v2,v3];

  results.forEach(r=>{
    let wordCount = r.split(" ").length;

    out.innerHTML += `
      <div class="card">
        ${r}
        <div class="stats">Words: ${wordCount}</div>
        <button class="copy-btn" onclick="copyText(this)">Copy</button>
      </div>
    `;
  });
}

// 🔥 COPY
function copyText(btn){
  let text = btn.parentElement.innerText.replace("Copy","");
  navigator.clipboard.writeText(text);
  btn.innerText = "Copied!";
}

</script>

</body>
</html>
