<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Caption Generator</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  padding: 20px;
}

.back-btn {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: white;
  background: rgba(255,255,255,0.2);
  padding: 10px 20px;
  border-radius: 30px;
  font-weight: bold;
}

.container {
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

.title {
  text-align: center;
  color: #6c5ce7;
}

textarea {
  width: 100%;
  height: 120px;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #6c5ce7;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.result {
  background: #f4f6ff;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  min-height: 80px;
}

.copy-btn {
  margin-top: 10px;
  background: #22c55e;
}
</style>
</head>

<body>

<a href="index.html" class="back-btn">← Back to Home</a>

<div class="container">

<h2 class="title">🤖 AI Caption Generator</h2>

<!-- ✅ FIXED ID -->
<textarea id="captionInput" placeholder="Enter topic (e.g. Coffee shop opening)"></textarea>

<!-- ✅ BUTTON -->
<button onclick="generateCaption()">🚀 Generate Caption</button>

<!-- ✅ FIXED ID -->
<div class="result" id="captionOutput"></div>

</div>

<!-- ✅ CONNECT MAIN SCRIPT -->
<script src="script.js"></script>

</body>
</html>
