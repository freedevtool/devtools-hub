<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Caption Generator</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

/* 🔥 AI TITLE */
.title {
  text-align: center;
  font-size: 28px;
  color: #6c5ce7;
  margin-bottom: 20px;
}

/* INPUT */
textarea {
  width: 100%;
  height: 120px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #6c5ce7;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* CAPTION CARDS */
.caption-card {
  background: #f8f9ff;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.caption-card button {
  margin-top: 10px;
  padding: 6px 10px;
  width: auto;
  font-size: 14px;
}

/* LOADING */
.loading {
  text-align: center;
  margin-top: 10px;
  color: #555;
}
</style>
</head>

<body>

<div class="container">

<h2 class="title">🤖 AI Caption Generator</h2>

<textarea id="input" placeholder="Enter your topic (e.g. Car for Mathura)"></textarea>

<button onclick="generateCaption()">🚀 Generate Viral Captions</button>

<div class="loading" id="loading"></div>

<div id="output"></div>

</div>

<script>

async function generateCaption() {
  const text = document.getElementById("input").value;

  if (!text) {
    alert("Enter topic first!");
    return;
  }

  document.getElementById("loading").innerText = "Generating viral captions... 🔥";
  document.getElementById("output").innerHTML = "";

  try {
    const res = await fetch("/api/caption", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text })
    });

    const data = await res.json();

    // 🔥 Split captions
    const captions = data.captions.split("Caption");

    document.getElementById("loading").innerText = "";

    document.getElementById("output").innerHTML =
      captions
        .filter(c => c.trim() !== "")
        .map(c => `
          <div class="caption-card">
            <p>${c.trim()}</p>
            <button onclick="copyText(this)">📋 Copy</button>
          </div>
        `).join("");

  } catch (error) {
    document.getElementById("loading").innerText = "Error generating captions ❌";
  }
}

/* COPY FUNCTION */
function copyText(btn) {
  const text = btn.previousElementSibling.innerText;
  navigator.clipboard.writeText(text);
  btn.innerText = "✅ Copied!";
}

</script>

</body>
</html>
