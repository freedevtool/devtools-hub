<!DOCTYPE html>
<html>
<head>
<title>AI Caption Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins;background:#f5f6ff;text-align:center;}
.top-bar{background:#6c5ce7;padding:10px;}
.nav-btn{background:#fff;color:#6c5ce7;padding:8px;border-radius:8px;margin:5px;}
input{padding:10px;margin:20px;border-radius:10px;}
button{padding:10px;background:#6c5ce7;color:#fff;border:none;border-radius:8px;}
</style>
</head>
<body>

<div class="top-bar">
<a href="index.html" class="nav-btn">🏠 Home</a>
<button onclick="history.back()" class="nav-btn">⬅ Back</button>
</div>

<h2 style="color:#6c5ce7;">AI Caption Generator</h2>

<input id="topic" placeholder="Enter topic"><br>
<button onclick="gen()">Generate</button>
<button onclick="reset()">Clear</button>

<h3 id="res"></h3>

<script>
function gen(){let t=topic.value;res.innerText="🔥 "+t+" vibes only! #"+t.replace(/\s/g,'')+" #trending";}
function reset(){topic.value="";res.innerText="";}
</script>

</body>
</html>
