<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Caption Generator – Viral Instagram Captions Tool</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background:#f5f3ff;
padding:20px;
}

.back-btn{
display:inline-block;
background:#6d28d9;
color:#fff;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
margin-bottom:20px;
}

.container{
max-width:650px;
margin:auto;
background:#fff;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#6d28d9;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin:10px 0;
}

.button-group{
display:flex;
gap:10px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
color:#fff;
font-weight:600;
}

.generate{background:#6d28d9;}
.clear{background:#ef4444;}

.result{
margin-top:20px;
}

.caption-box{
background:#ede9fe;
padding:12px;
border-radius:8px;
margin-bottom:10px;
}

</style>
</head>

<body>

<a href="index.html" class="back-btn">← Back to Tools</a>

<div class="container">

<h1>🤖 AI Caption Generator</h1>

<input type="text" id="keyword" placeholder="Enter topic (e.g. Car for Mathura)">

<div class="button-group">
<button class="generate" onclick="generateCaptions()">Generate</button>
<button class="clear" onclick="clearCaptions()">Clear</button>
</div>

<div class="result" id="result"></div>

</div>

<script>

function generateCaptions(){

let input=document.getElementById("keyword").value.trim();

if(!input){
alert("Enter keyword!");
return;
}

let base=input.toLowerCase().replace(/\s+/g,'');

// Caption styles
let templates=[
`🔥 ${input} vibes only! #${base} #viral #trending`,
`🚗 Living the ${input} dream 💫 #roadtrip #${base}`,
`✨ Just another ${input} moment 😎 #explore #life`,
`💥 ${input} scenes hit different 🔥 #reels #${base}`,
`🌄 ${input} journey begins now 🚀 #travelgram`,
`😎 ${input} mood ON! #instagood #${base}`,
`🚘 Cruising into ${input} style 💯 #luxurylife`,
`🌟 ${input} goals unlocked! #dreamlife`,
`📍 ${input} diaries begin… #wanderlust`,
`🔥 ${input} but make it viral 🚀 #explorepage`
];

// Shuffle for randomness
templates.sort(() => 0.5 - Math.random());

// Pick 3 unique captions
let selected = templates.slice(0,3);

// Display
let output = selected.map(c => `<div class="caption-box">${c}</div>`).join('');

document.getElementById("result").innerHTML = output;

}

function clearCaptions(){
document.getElementById("keyword").value="";
document.getElementById("result").innerHTML="";
}

</div> 
</script>

</body>
</html>
