<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Caption Generator</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  padding: 20px;
}

/* BACK BUTTON */
.back-btn {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: white;
  background: rgba(255,255,255,0.2);
  padding: 10px 20px;
  border-radius: 30px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

/* TITLE */
.title {
  text-align: center;
  color: #6c5ce7;
}

/* INPUT */
textarea {
  width: 100%;
  height: 120px;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #6c5ce7;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* CARDS */
.card {
  background: #f4f6ff;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
}

.copy-btn {
  margin-top: 10px;
  background: #22c55e;
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  color: white;
}

/* LOADING */
.loading {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<a href="index.html" class="back-btn">← Back to Home</a>

<div class="container">

<h2 class="title">🤖 AI Caption Generator</h2>

<textarea id="input" placeholder="Enter topic (Car for Mathura)"></textarea>

<button onclick="generate()">🚀 Generate Captions</button>

<div class="loading" id="loading"></div>
<div id="output"></div>

</div>

<script>
function generateCaption(){

  let input = document.getElementById("input").value;
  let output = document.getElementById("output");

  output.innerText = "Loading...";

  fetch("https://ai-tools-backend-wkam.onrender.com", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ prompt: input })
  })
  .then(res => res.json())
  .then(data => {
    output.innerText = data.result;
  })
  .catch(err => {
    output.innerText = "Error!";
  });
}
</script>

<script src="script.js"></script>
  
</body>
</html>
