<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="canonical" href="https://www.exploredevtools.com/password-generator.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="TppyO_9iEI0Ey1QJ21HOrPLPLoMVDviDPF3ICqZr_v4" />
    <title>Password Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .back-link {
            color: white;
            text-decoration: none;
            font-size: 1.2em;
            display: inline-block;
            margin-bottom: 20px;
        }
        .tool-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #333; margin-bottom: 20px; }
        .password-box {
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            font-size: 1.5em;
            font-family: monospace;
            text-align: center;
            margin-bottom: 20px;
            word-break: break-all;
            min-height: 80px;
        }
        .control-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
        }
        input[type=range] {
            width: 100%;
            height: 40px;
        }
        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            margin-bottom: 10px;
            touch-action: manipulation;
        }
        button:active {
            background: #5a67d8;
            transform: scale(0.98);
        }
        .copy-btn {
            background: #48bb78;
        }
        .length-value {
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to Tools</a>
        
        <div class="tool-card">
            <h1>🔐 Password Generator</h1>
            
            <div class="password-box" id="password">Click Generate</div>
            
            <div class="control-group">
                <label>Length: <span class="length-value" id="lengthVal">12</span></label>
                <input type="range" id="length" min="4" max="32" value="12">
            </div>
            
            <div class="checkbox-group">
                <label><input type="checkbox" id="uppercase" checked> Uppercase (A-Z)</label>
                <label><input type="checkbox" id="lowercase" checked> Lowercase (a-z)</label>
                <label><input type="checkbox" id="numbers" checked> Numbers (0-9)</label>
                <label><input type="checkbox" id="symbols"> Symbols (!@#$%)</label>
            </div>
            
            <button onclick="generatePassword()">Generate New Password</button>
            <button class="copy-btn" onclick="copyPassword()">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const lower = 'abcdefghijklmnopqrstuvwxyz';
        const numbers = '0123456789';
        const symbols = '!@#$%^&*';
        
        document.getElementById('length').addEventListener('input', function(e) {
            document.getElementById('lengthVal').textContent = e.target.value;
        });
        
        function generatePassword() {
            let chars = '';
            if (document.getElementById('uppercase').checked) chars += upper;
            if (document.getElementById('lowercase').checked) chars += lower;
            if (document.getElementById('numbers').checked) chars += numbers;
            if (document.getElementById('symbols').checked) chars += symbols;
            
            if (chars === '') {
                alert('Select at least one character type!');
                return;
            }
            
            const length = document.getElementById('length').value;
            let password = '';
            
            for (let i = 0; i < length; i++) {
                password += chars[Math.floor(Math.random() * chars.length)];
            }
            
            document.getElementById('password').textContent = password;
        }
        
        function copyPassword() {
            const password = document.getElementById('password').textContent;
            if (password === 'Click Generate') return;
            
            navigator.clipboard.writeText(password).then(() => {
                alert('Password copied!');
            });
        }
        
        // Generate on page load
        window.onload = generatePassword;
    </script>
</body>
</html>
