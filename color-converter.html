                text-align: center;

<body>

            <!-- Color Input Options -->

                    <input type="color" id="colorPicker" value="#667eea">

            <!-- Buttons -->

                <button class="secondary-btn" onclick="resetColor()">↺ Reset</button>
            </div>
            
            <!-- Color Values -->
            <div class="color-values" id="colorValues">
                <div class="color-value-item">
                    <span class="value-label">HEX:</span>
                    <span class="value-text" id="hexValue">#667eea</span>
                    <button class="copy-btn" onclick="copyToClipboard('hexValue')">Copy</button>
                </div>
                <div class="color-value-item">
                    <span class="value-label">RGB:</span>
                    <span class="value-text" id="rgbValue">rgb(102, 126, 234)</span>
                    <button class="copy-btn" onclick="copyToClipboard('rgbValue')">Copy</button>
                </div>
                <div class="color-value-item">
                    <span class="value-label">HSL:</span>
                    <span class="value-text" id="hslValue">hsl(230, 76%, 66%)</span>
                    <button class="copy-btn" onclick="copyToClipboard('hslValue')">Copy</button>
                </div>
                <div class="color-value-item">
                    <span class="value-label">Color Name:</span>
                    <span class="value-text" id="colorName">Medium Slate Blue</span>
                    <button class="copy-btn" onclick="copyToClipboard('colorName')">Copy</button>
                </div>
            </div>
            
            <!-- Message Area -->
            <div id="messageBox" class="message-area"></div>
        </div>
    </div>

        // Sync color picker with text input
        document.getElementById('colorPicker').addEventListener('input', function(e) {
            document.getElementById('colorInput').value = e.target.value;
            convertColor();
        });
        
        function hexToRgb(hex) {
            // Remove # if present
            hex = hex.replace(/^#/, '');
            
            // Parse hex values
            let r, g, b;
            if (hex.length === 3) {
                r = parseInt(hex[0] + hex[0], 16);
                g = parseInt(hex[1] + hex[1], 16);
                b = parseInt(hex[2] + hex[2], 16);
            } else if (hex.length === 6) {
                r = parseInt(hex.substring(0, 2), 16);
                g = parseInt(hex.substring(2, 4), 16);
                b = parseInt(hex.substring(4, 6), 16);
            } else {
                return null;
            }
            
            return { r, g, b };
        }
        
        function rgbToHsl(r, g, b) {
            r /= 255;
            g /= 255;
            b /= 255;
            
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            
            if (max === min) {
                h = s = 0; // achromatic
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            
            h = Math.round(h * 360);
            s = Math.round(s * 100);
            l = Math.round(l * 100);
            
            return { h, s, l };
        }
        
        function parseColor(input) {
            // Check if it's HEX
            if (input.startsWith('#')) {
                return hexToRgb(input);
            }
            
            // Check if it's RGB format
            const rgbMatch = input.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/i);
            if (rgbMatch) {
                return {
                    r: parseInt(rgbMatch[1]),
                    g: parseInt(rgbMatch[2]),
                    b: parseInt(rgbMatch[3])
                };
            }
            
            // Check if it's color name
            for (let [hex, name] of Object.entries(colorNames)) {
                if (name.toLowerCase() === input.toLowerCase()) {
                    return hexToRgb(hex);
                }
            }
            
            return null;
        }
        
        function convertColor() {
            const input = document.getElementById('colorInput').value.trim();
            const preview = document.getElementById('colorPreview');
            const colorPicker = document.getElementById('colorPicker');
            const messageBox = document.getElementById('messageBox');
            
            if (!input) {
                messageBox.innerHTML = 'Please enter a color';
                messageBox.className = 'message-area error-message';
                return;
            }
            
            const rgb = parseColor(input);
            
            if (!rgb) {
                messageBox.innerHTML = 'Invalid color format. Use HEX (#ff0000), RGB (rgb(255,0,0)), or color name (red)';
                messageBox.className = 'message-area error-message';
                return;
            }
            
            // Update preview
            const rgbString = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
            preview.style.backgroundColor = rgbString;
            
            // Update color picker
            const hex = '#' + ((1 << 24) + (rgb.r << 16) + (rgb.g << 8) + rgb.b).toString(16).slice(1);
            colorPicker.value = hex;
            
            // Update values
            document.getElementById('hexValue').textContent = hex.toUpperCase();
            document.getElementById('rgbValue').textContent = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
            
            const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
            document.getElementById('hslValue').textContent = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
            
            // Find color name
            const colorName = colorNames[hex.toLowerCase()] || 'Custom Color';
            document.getElementById('colorName').textContent = colorName;
            
            messageBox.innerHTML = '✅ Color converted successfully!';
            messageBox.className = 'message-area success-message';
            
            setTimeout(() => {
                messageBox.innerHTML = '';
                messageBox.className = 'message-area';
            }, 2000);
        }
        
        function resetColor() {
            document.getElementById('colorInput').value = '#667eea';
            document.getElementById('colorPicker').value = '#667eea';
            convertColor();
        }
        
        function copyToClipboard(elementId) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(() => {
                const messageBox = document.getElementById('messageBox');
                messageBox.innerHTML = '✅ Copied to clipboard!';
                messageBox.className = 'message-area success-message';
                
                setTimeout(() => {
                    messageBox.innerHTML = '';
                    messageBox.className = 'message-area';
                }, 2000);
            });
        }
        
        // Initial conversion
        window.onload = convertColor;
