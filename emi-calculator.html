<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EMI Calculator India</title>
<style>
body { font-family: Arial; background:#0f172a; color:#fff; padding:20px; }
.container { max-width:400px; margin:auto; background:#1e293b; padding:20px; border-radius:10px; }
input, button { width:100%; padding:10px; margin-top:10px; border:none; border-radius:5px; }
.calc-btn { background:#22c55e; }
.clear-btn { background:#ef4444; }
.result span { display:block; margin-top:5px; }
.links a { color:#38bdf8; display:block; margin-top:5px; }
</style>
</head>
<body>

<div class="container">
<h2>EMI Calculator</h2>

<input type="number" id="loan" placeholder="Loan Amount ₹">
<input type="number" id="rate" placeholder="Interest Rate (%)">
<input type="number" id="time" placeholder="Time (months)">

<button class="calc-btn" onclick="calculateEMI()">Calculate EMI</button>
<button class="clear-btn" onclick="clearEMI()">Clear</button>

<div class="result" id="result"></div>

<div class="links">
<h4>Try Other Tools:</h4>
<a href="/gst-calculator.html">GST Calculator</a>
<a href="/word-counter.html">Word Counter</a>
</div>
</div>

<script>
function calculateEMI() {
    let P = document.getElementById("loan").value;
    let R = document.getElementById("rate").value / 12 / 100;
    let N = document.getElementById("time").value;

    if(!P || !R || !N) return;

    let EMI = (P * R * Math.pow(1 + R, N)) / (Math.pow(1 + R, N) - 1);

    document.getElementById("result").innerHTML =
    `<span style="color:#22c55e">Monthly EMI: ₹${EMI.toFixed(2)}</span>`;
}

function clearEMI() {
    document.getElementById("loan").value = "";
    document.getElementById("rate").value = "";
    document.getElementById("time").value = "";
    document.getElementById("result").innerHTML = "";
}
</script>

</body>
</html>
