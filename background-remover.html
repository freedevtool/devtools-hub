<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Background Remover Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Poppins;
background:#f5f6ff;
}

/* TOP BAR */
.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
background:#6c5ce7;
padding:12px 15px;
}

.nav-btn{
background:#fff;
color:#6c5ce7;
padding:8px 14px;
border-radius:8px;
text-decoration:none;
font-weight:600;
border:none;
}

/* TITLE */
.title{
text-align:center;
margin:20px;
color:#6c5ce7;
}

/* MAIN CARD */
.container{
max-width:900px;
margin:auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* UPLOAD AREA */
.upload{
border:2px dashed #6c5ce7;
padding:30px;
text-align:center;
border-radius:15px;
cursor:pointer;
margin-bottom:20px;
}

.upload:hover{
background:#f1f2ff;
}

.upload-icon{
font-size:40px;
margin-bottom:10px;
}

/* PREVIEW */
.preview{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.card{
background:#f9f9ff;
padding:15px;
border-radius:10px;
text-align:center;
}

.card img{
max-width:100%;
max-height:200px;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#6c5ce7;
color:#fff;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.download{
display:inline-block;
margin-top:15px;
padding:12px 25px;
background:#00b894;
color:#fff;
border-radius:8px;
text-decoration:none;
}

/* LOADING */
.loader{
display:none;
text-align:center;
margin-top:20px;
font-weight:600;
}

/* MOBILE */
@media(max-width:768px){
.preview{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- TOP NAV -->
<div class="top-bar">
<a href="index.html" class="nav-btn">🏠 Home</a>
<button onclick="history.back()" class="nav-btn">⬅ Back</button>
</div>

<h2 class="title">✨ Background Remover</h2>

<div class="container">

<!-- UPLOAD -->
<div class="upload" onclick="fileInput.click()">
<div class="upload-icon">📸</div>
<p>Click to upload image</p>
<input type="file" id="fileInput" hidden>
</div>

<!-- PREVIEW -->
<div class="preview" id="preview" style="display:none;">

<div class="card">
<h3>Original</h3>
<img id="orig">
</div>

<div class="card">
<h3>Result</h3>
<img id="result">
</div>

</div>

<button onclick="removeBg()">Remove Background</button>

<div class="loader" id="loader">Processing... ⏳</div>

<div style="text-align:center;">
<a id="download" class="download" style="display:none;">Download</a>
</div>

</div>

<script>
const API_KEY='sYevBqp7pWcRkrRJd4t3TBpr';

let file;

fileInput.onchange=e=>{
file=e.target.files[0];
if(!file)return;

orig.src=URL.createObjectURL(file);
preview.style.display='grid';
};

async function removeBg(){
if(!file){alert("Upload image first");return;}

loader.style.display='block';

let formData=new FormData();
formData.append("image_file",file);

let res=await fetch("https://api.remove.bg/v1.0/removebg",{
method:"POST",
headers:{'X-Api-Key':API_KEY},
body:formData
});

if(!res.ok){
alert("Error processing image");
loader.style.display='none';
return;
}

let blob=await res.blob();
let url=URL.createObjectURL(blob);

result.src=url;

download.href=url;
download.download="no-bg.png";
download.style.display="inline-block";

loader.style.display='none';
}
</script>

</body>
</html>
