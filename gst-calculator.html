<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GST Calculator</title>
<style>
body{font-family:Poppins;background:#f8f9fc;text-align:center;}
.top-bar{background:#6c5ce7;padding:10px;}
.top-bar a,button{margin:5px;padding:8px 12px;border:none;border-radius:6px;}
.container{margin-top:50px;}
input,select{padding:10px;margin:10px;}
button{background:#6c5ce7;color:#fff;}
</style>
</head>
<body>

<div class="top-bar">
<a href="index.html">🏠 Home</a>
<button onclick="history.back()">⬅ Back</button>
</div>

<div class="container">
<h2>GST Calculator</h2>
<input type="number" id="amount" placeholder="Enter Amount">
<select id="gst">
<option value="5">5%</option>
<option value="12">12%</option>
<option value="18">18%</option>
<option value="28">28%</option>
</select>
<br>
<button onclick="calc()">Calculate</button>
<h3 id="result"></h3>
</div>

<script>
function calc(){
let amt=document.getElementById("amount").value;
let gst=document.getElementById("gst").value;
let total=amt*(1+gst/100);
document.getElementById("result").innerText="Total: ₹"+total;
}
</script>

</body>
</html>
