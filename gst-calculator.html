body { font-family: Arial; background:#0f172a; color:#fff; padding:20px; }
.container { max-width:400px; margin:auto; background:#1e293b; padding:20px; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin-top:10px; border:none; border-radius:5px; }
button { cursor:pointer; }
.calc-btn { background:#22c55e; color:white; }
.clear-btn { background:#ef4444; color:white; }
.result { margin-top:15px; font-weight:bold; }
.result span { display:block; margin-top:5px; }
.links a { color:#38bdf8; text-decoration:none; display:block; margin-top:5px; }

  .top-bar{

gap:10px;

background:#6c5ce7;

  .top-bar{

</style>
</head>
<body>

<div class="container">
<h2>GST Calculator 🇮🇳</h2>

<input type="number" id="amount" placeholder="Enter Amount">
<select id="gst">
<option value="5">5%</option>
<option value="12">12%</option>
<option value="18">18%</option>
<option value="28">28%</option>
</select>

<button class="calc-btn" onclick="calculateGST()">Calculate</button>
<button class="clear-btn" onclick="clearGST()">Clear</button>

<div class="result" id="result"></div>

<div class="links">
<h4>Try Other Tools:</h4>
<a href="/word-counter.html">Word Counter</a>
<a href="/grammar-checker.html">Grammar Checker</a>
</div>
</div>

<script>
function calculateGST() {
    let amount = document.getElementById("amount").value;
    let gst = document.getElementById("gst").value;

    if(!amount) return;

    let gstAmount = (amount * gst) / 100;
    let total = Number(amount) + gstAmount;

    document.getElementById("result").innerHTML =
        `<span style="color:#22c55e">GST: ₹${gstAmount.toFixed(2)}</span>
         <span style="color:#facc15">Total: ₹${total.toFixed(2)}</span>`;
}

function clearGST() {
    document.getElementById("amount").value = "";
    document.getElementById("result").innerHTML = "";
}
</script>

</body>
