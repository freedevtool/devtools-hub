<!DOCTYPE html>
<html>
<head>
<title>GST Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins;background:#f5f6ff;margin:0;}
.top-bar{display:flex;justify-content:space-between;background:#6c5ce7;padding:12px;}
.nav-btn{background:#fff;color:#6c5ce7;padding:8px 12px;border-radius:8px;text-decoration:none;font-weight:600;}
.title{text-align:center;margin:20px;color:#6c5ce7;}
.container{max-width:400px;margin:auto;background:#fff;padding:25px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
input{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ddd;}
button{width:100%;padding:12px;background:#6c5ce7;color:#fff;border:none;border-radius:8px;}
.tabs{display:flex;gap:8px;}
.tabs button{flex:1;background:#eee;}
.tabs button.active{background:#6c5ce7;color:#fff;}
.result{margin-top:15px;}
</style>
</head>
<body>

<div class="top-bar">
<a href="index.html" class="nav-btn">🏠 Home</a>
<button onclick="history.back()" class="nav-btn">⬅ Back</button>
</div>

<h2 class="title">GST Calculator</h2>

<div class="container">
<input id="amt" placeholder="Enter Amount">

<div class="tabs">
<button onclick="set(5,this)">5%</button>
<button onclick="set(12,this)">12%</button>
<button onclick="set(18,this)" class="active">18%</button>
<button onclick="set(28,this)">28%</button>
</div>

<button onclick="calc()">Calculate</button>
<button onclick="reset()">Clear</button>

<div class="result" id="res"></div>
</div>

<script>
let rate=18;
function set(r,e){rate=r;document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));e.classList.add("active");}
function calc(){let a=amt.value;if(!a)return;let g=a*rate/100;res.innerHTML="GST: ₹"+g.toFixed(2)+"<br>Total: ₹"+(parseFloat(a)+g).toFixed(2);}
function reset(){amt.value="";res.innerHTML="";}
</script>

</body>
</html>
