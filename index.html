<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ExploreDevTools</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:#f8f9fc;
color:#1e293b;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* HEADER */
.header{
position:relative;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:20px;
}

.menu-icon{
position:absolute;
left:10px;
font-size:26px;
cursor:pointer;
color:#6c5ce7;
}

.logo-center img{
height:60px;
}

.logo-center h1{
font-size:1.6em;
color:#6c5ce7;
}

/* HERO */
.hero{
text-align:center;
margin:30px 0;
}

.hero h1{
color:#6c5ce7;
}

/* GRID */
.tools-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:20px;
}

.tool-card{
background:#fff;
padding:20px;
border-radius:12px;
text-decoration:none;
color:#333;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
transition:0.3s;
}

.tool-card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(108,92,231,0.2);
}

/* ANALYTICS */
.analytics-strip{
display:flex;
gap:10px;
overflow-x:auto;
margin-top:20px;
}

.stat{
min-width:150px;
background:#fff;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.stat h3{
color:#6c5ce7;
}

/* ===== RIBBON UI ===== */
.ribbon-section{
margin:30px 0;
}

.ribbon-title{
font-size:16px;
font-weight:600;
margin-bottom:10px;
}

.ribbon-container{
display:flex;
gap:12px;
overflow-x:auto;
padding-bottom:10px;
}

.ribbon-card{
min-width:170px;
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-radius:10px;
text-decoration:none;
background:linear-gradient(135deg,#764ba2,#667eea);
color:#fff;
transition:0.3s;
}

.ribbon-card img{
width:40px;
height:40px;
background:#fff;
border-radius:6px;
padding:3px;
object-fit:contain;
}

.ribbon-card:hover{
transform:translateY(-3px);
}

.ribbon-container::-webkit-scrollbar{
display:none;
}

/* FOOTER */
footer{
margin-top:40px;
background:#6c5ce7;
color:#fff;
padding:20px;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<header class="header">
<div class="menu-icon">☰</div>

<div class="logo-center">
<img src="logo.png">
<h1>ExploreDevTools</h1>
</div>
</header>

<!-- HERO -->
<div class="hero">
<h1>🚀 Free Online Tools</h1>
<p>GST, EMI, AI, Image tools & more</p>
</div>

<!-- TOOLS -->
<div class="tools-grid">
<a href="#" class="tool-card">GST Calculator</a>
<a href="#" class="tool-card">EMI Calculator</a>
<a href="#" class="tool-card">Grammar Checker</a>
<a href="#" class="tool-card">QR Generator</a>
</div>

<!-- ANALYTICS -->
<div class="analytics-strip">
<div class="stat"><h3>28</h3><p>Users</p></div>
<div class="stat"><h3>120</h3><p>Total Usage</p></div>
<div class="stat"><h3>GST</h3><p>Most Used</p></div>
</div>

<!-- ✅ PARTNER RIBBON -->
<div class="ribbon-section">
<h3 class="ribbon-title">🤝 Our Partners</h3>

<div class="ribbon-container">
<a href="https://www.carandcab.com" target="_blank" class="ribbon-card">
<img src="/images/footerlogo.png">
<span>Car & Cab</span>
</a>
</div>
</div>

<!-- ✅ ALSO LIKED -->
<div class="ribbon-section">
<h3 class="ribbon-title">🔥 Also Liked By</h3>

<div class="ribbon-container">
<a href="https://www.youtube.com/@wanderingjerk" target="_blank" class="ribbon-card">
<img src="/images/channels4_profile.jpg">
<span>Wandering Jerk</span>
</a>
</div>
</div>

<!-- FOOTER -->
<footer>
© 2026 ExploreDevTools
</footer>

</div>

</body>
</html>
