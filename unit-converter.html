<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="canonical" href="https://www.exploredevtools.com/unit-converter.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter - DevTools Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .tool-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { margin-bottom: 20px; }
        .category {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .cat-btn {
            flex: 1;
            padding: 10px;
            background: #e2e8f0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .cat-btn.active {
            background: #667eea;
            color: white;
        }
        .converter {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
        }
        .input-group {
            margin: 15px 0;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .result {
            text-align: center;
            font-size: 1.5em;
            padding: 20px;
            background: white;
            border-radius: 5px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back</a>
        <div class="tool-card">
            <h1>📏 Unit Converter</h1>
            <div class="category">
                <button class="cat-btn active" onclick="setCategory('length')">Length</button>
                <button class="cat-btn" onclick="setCategory('weight')">Weight</button>
                <button class="cat-btn" onclick="setCategory('temp')">Temperature</button>
            </div>
            <div class="converter">
                <div class="input-group">
                    <input type="number" id="fromVal" value="1" oninput="convert()">
                    <select id="fromUnit" onchange="convert()"></select>
                </div>
                <button onclick="swap()">⇅ Swap</button>
                <div class="input-group">
                    <input type="text" id="toVal" readonly>
                    <select id="toUnit" onchange="convert()"></select>
                </div>
                <div class="result" id="result">1</div>
            </div>
        </div>
    </div>
    <script>
        let category = 'length';
        const units = {
            length: { meter:1, km:0.001, cm:100, mm:1000, mile:0.000621, yard:1.094, foot:3.281, inch:39.37 },
            weight: { kg:1, g:1000, mg:1e6, lb:2.205, oz:35.274 },
            temp: { celsius:'c', fahrenheit:'f', kelvin:'k' }
        };

        function setCategory(cat) {
            category = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateUnits();
        }

        function updateUnits() {
            const from = document.getElementById('fromUnit');
            const to = document.getElementById('toUnit');
            from.innerHTML = ''; to.innerHTML = '';
            for (let u in units[category]) {
                from.innerHTML += `<option value="${u}">${u}</option>`;
                to.innerHTML += `<option value="${u}">${u}</option>`;
            }
            convert();
        }

        function convert() {
            const val = parseFloat(document.getElementById('fromVal').value) || 0;
            const from = document.getElementById('fromUnit').value;
            const to = document.getElementById('toUnit').value;
            let result = 0;

            if (category === 'temp') {
                if (from === 'celsius' && to === 'fahrenheit') result = val * 9/5 + 32;
                else if (from === 'celsius' && to === 'kelvin') result = val + 273.15;
                else if (from === 'fahrenheit' && to === 'celsius') result = (val - 32) * 5/9;
                else if (from === 'fahrenheit' && to === 'kelvin') result = (val - 32) * 5/9 + 273.15;
                else if (from === 'kelvin' && to === 'celsius') result = val - 273.15;
                else if (from === 'kelvin' && to === 'fahrenheit') result = (val - 273.15) * 9/5 + 32;
                else result = val;
            } else {
                result = val * (units[category][to] / units[category][from]);
            }

            document.getElementById('toVal').value = result.toFixed(4);
            document.getElementById('result').textContent = result.toFixed(4);
        }

        function swap() {
            const from = document.getElementById('fromUnit');
            const to = document.getElementById('toUnit');
            const temp = from.value;
            from.value = to.value;
            to.value = temp;
            convert();
        }

        updateUnits();
    </script>
</body>
</html>
